<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Where to Buy - Interactive Globe</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- React and ReactDOM CDNs -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <!-- Babel CDN to compile JSX on the fly in the browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
        },
      },
    }
  </script>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: black;
      margin: 0;
    }
  </style>
</head>
<body class="bg-black">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    function WhereToBuyMockup() {
      // Estado para el buscador
      const [searchQuery, setSearchQuery] = useState('');
      
      // Estado para saber qué tarjeta está seleccionada/hovered
      const [hoveredCity, setHoveredCity] = useState(null);

      // Refs para controlar el arrastre y la rotación sin causar re-renders innecesarios en React
      const canvasRef = useRef(null);
      const rotationRef = useRef(0);
      const tiltRef = useRef(0.3); // Inclinación inicial por defecto (tilted look)
      const isDraggingRef = useRef(false);
      const dragStartRef = useRef({ x: 0, y: 0, r: 0, t: 0 });
      const hoveredCityRef = useRef(null);

      // Sincronizar el hover con el ref para que el bucle de canvas lo lea en tiempo real
      useEffect(() => {
        hoveredCityRef.current = hoveredCity;
      }, [hoveredCity]);

      // Lista de productos con coordenadas de latitud/longitud reales en radianes
      const products = [
        {
          city: 'Tokyo',
          type: 'Hidden Market',
          item: 'Vintage Cameras',
          description: 'Rare film cameras and analog gear.',
          lat: (35.6762 * Math.PI) / 180,
          lon: (139.6503 * Math.PI) / 180,
        },
        {
          city: 'Buenos Aires',
          type: 'Local Craft',
          item: 'Leather Jackets',
          description: 'Handmade leather shops and artisan markets.',
          lat: (-34.6037 * Math.PI) / 180,
          lon: (-58.3816 * Math.PI) / 180,
        },
        {
          city: 'Berlin',
          type: 'Online + Local',
          item: 'Mechanical Keyboards',
          description: 'Boutiques, custom builders and online stores.',
          lat: (52.5200 * Math.PI) / 180,
          lon: (13.4050 * Math.PI) / 180,
        },
      ];

      // Filtrar productos según la búsqueda en tiempo real
      const filteredProducts = products.filter((product) =>
        product.item.toLowerCase().includes(searchQuery.toLowerCase()) ||
        product.city.toLowerCase().includes(searchQuery.toLowerCase()) ||
        product.description.toLowerCase().includes(searchQuery.toLowerCase())
      );

      // Manejadores de interacción del mouse para arrastrar el globo
      const handleMouseDown = (e) => {
        isDraggingRef.current = true;
        dragStartRef.current = {
          x: e.clientX,
          y: e.clientY,
          r: rotationRef.current,
          t: tiltRef.current,
        };
      };

      const handleMouseMove = (e) => {
        if (!isDraggingRef.current) return;
        const dx = e.clientX - dragStartRef.current.x;
        const dy = e.clientY - dragStartRef.current.y;
        
        // Sensibilidad del arrastre
        rotationRef.current = dragStartRef.current.r + dx * 0.005;
        
        // Limitar inclinación para evitar bloqueo de cámara
        tiltRef.current = Math.max(
          -Math.PI / 2.5,
          Math.min(Math.PI / 2.5, dragStartRef.current.t - dy * 0.005)
        );
      };

      const handleMouseUp = () => {
        isDraggingRef.current = false;
      };

      // Manejadores para pantallas táctiles (móviles)
      const handleTouchStart = (e) => {
        if (e.touches.length !== 1) return;
        isDraggingRef.current = true;
        dragStartRef.current = {
          x: e.touches[0].clientX,
          y: e.touches[0].clientY,
          r: rotationRef.current,
          t: tiltRef.current,
        };
      };

      const handleTouchMove = (e) => {
        if (!isDraggingRef.current || e.touches.length !== 1) return;
        const dx = e.touches[0].clientX - dragStartRef.current.x;
        const dy = e.touches[0].clientY - dragStartRef.current.y;
        
        rotationRef.current = dragStartRef.current.r + dx * 0.005;
        tiltRef.current = Math.max(
          -Math.PI / 2.5,
          Math.min(Math.PI / 2.5, dragStartRef.current.t - dy * 0.005)
        );
      };

      const handleTouchEnd = () => {
        isDraggingRef.current = false;
      };

      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;

        const ctx = canvas.getContext('2d');
        let animationFrame;

        // Ajusta la resolución del canvas según la pantalla (evita que se vea borroso)
        const resizeCanvas = () => {
          const dpr = window.devicePixelRatio || 1;
          const rect = canvas.getBoundingClientRect();
          canvas.width = rect.width * dpr;
          canvas.height = rect.height * dpr;
          ctx.scale(dpr, dpr);
        };

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Función matemática de Proyección Ortográfica 3D
        const project = (lat, lon, rotation, tilt, radius) => {
          // Coordenadas esféricas a cartesianas 3D en esfera unitaria
          const x0 = Math.cos(lat) * Math.sin(lon);
          const y0 = Math.sin(lat);
          const z0 = Math.cos(lat) * Math.cos(lon);

          // Rotación sobre el eje Y (giro del globo)
          const cosR = Math.cos(rotation);
          const sinR = Math.sin(rotation);
          const x1 = x0 * cosR + z0 * sinR;
          const y1 = y0;
          const z1 = -x0 * sinR + z0 * cosR;

          // Inclinación sobre el eje X (tilt arriba/abajo)
          const cosT = Math.cos(tilt);
          const sinT = Math.sin(tilt);
          const x2 = x1;
          const y2 = y1 * cosT - z1 * sinT;
          const z2 = y1 * sinT + z1 * cosT; // profundidad

          return {
            x: x2 * radius,
            y: -y2 * radius, // Invertir eje Y para Canvas
            z: z2, // z > 0 está al frente, z < 0 está detrás
          };
        };

        const drawGlobe = () => {
          // Rotación automática si no se está arrastrando
          if (!isDraggingRef.current) {
            rotationRef.current += 0.0015;
          }
          const rotation = rotationRef.current;
          const tilt = tiltRef.current;

          const rect = canvas.getBoundingClientRect();
          const width = rect.width;
          const height = rect.height;

          if (width === 0 || height === 0) {
            resizeCanvas();
          }

          ctx.clearRect(0, 0, width, height);

          const centerX = width / 2;
          const centerY = height / 2;
          const radius = Math.min(width, height) * 0.35; // Tamaño del globo

          // 1. Dibujar esfera base del globo (Gradiente Radial de fondo)
          const gradient = ctx.createRadialGradient(
            centerX - radius * 0.3,
            centerY - radius * 0.3,
            radius * 0.2,
            centerX,
            centerY,
            radius
          );
          gradient.addColorStop(0, '#1e3a8a'); // Azul brillante
          gradient.addColorStop(0.7, '#0f172a'); // Azul oscuro profundo
          gradient.addColorStop(1, '#020617'); // Negro

          ctx.beginPath();
          ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
          ctx.fillStyle = gradient;
          ctx.fill();

          // 2. Brillo exterior (Atmósfera)
          const glowGradient = ctx.createRadialGradient(
            centerX, centerY, radius - 5,
            centerX, centerY, radius + 20
          );
          glowGradient.addColorStop(0, 'rgba(56, 189, 248, 0.18)');
          glowGradient.addColorStop(0.5, 'rgba(56, 189, 248, 0.06)');
          glowGradient.addColorStop(1, 'rgba(56, 189, 248, 0)');

          ctx.beginPath();
          ctx.arc(centerX, centerY, radius + 20, 0, Math.PI * 2);
          ctx.fillStyle = glowGradient;
          ctx.fill();

          // 3. Dibujar Rejilla 3D (Latitudes y Longitudes)
          ctx.lineWidth = 0.8;

          // Dibujar líneas de Latitud
          const latitudes = [-60, -40, -20, 0, 20, 40, 60];
          latitudes.forEach((latDeg) => {
            const lat = (latDeg * Math.PI) / 180;
            ctx.beginPath();
            let drawing = false;

            // Resaltar el Ecuador
            ctx.strokeStyle = latDeg === 0 ? 'rgba(56, 189, 248, 0.25)' : 'rgba(255, 255, 255, 0.06)';

            for (let lonDeg = -180; lonDeg <= 180; lonDeg += 5) {
              const lon = (lonDeg * Math.PI) / 180;
              const p = project(lat, lon, rotation, tilt, radius);

              if (p.z > 0) { // Solo dibuja si está al frente
                const px = centerX + p.x;
                const py = centerY + p.y;
                if (!drawing) {
                  ctx.moveTo(px, py);
                  drawing = true;
                } else {
                  ctx.lineTo(px, py);
                }
              } else {
                drawing = false;
              }
            }
            ctx.stroke();
          });

          // Dibujar líneas de Longitud
          const longitudes = [0, 30, 60, 90, 120, 150, 180, 210, 240, 270, 300, 330];
          ctx.strokeStyle = 'rgba(255, 255, 255, 0.06)';
          longitudes.forEach((lonDeg) => {
            const lon = (lonDeg * Math.PI) / 180;
            ctx.beginPath();
            let drawing = false;

            for (let latDeg = -90; latDeg <= 90; latDeg += 5) {
              const lat = (latDeg * Math.PI) / 180;
              const p = project(lat, lon, rotation, tilt, radius);

              if (p.z > 0) {
                const px = centerX + p.x;
                const py = centerY + p.y;
                if (!drawing) {
                  ctx.moveTo(px, py);
                  drawing = true;
                } else {
                  ctx.lineTo(px, py);
                }
              } else {
                drawing = false;
              }
            }
            ctx.stroke();
          });

          // 4. Dibujar los puntos de los mercados
          products.forEach((product, index) => {
            const p = project(product.lat, product.lon, rotation, tilt, radius);

            if (p.z > 0) {
              const px = centerX + p.x;
              const py = centerY + p.y;
              const isHovered = hoveredCityRef.current === product.city;

              if (isHovered) {
                const pulse = 6 + Math.sin(Date.now() / 150) * 2;
                
                ctx.beginPath();
                ctx.arc(px, py, pulse + 6, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(56, 189, 248, 0.45)';
                ctx.fill();

                ctx.beginPath();
                ctx.arc(px, py, pulse, 0, Math.PI * 2);
                ctx.fillStyle = '#38bdf8';
                ctx.fill();

                ctx.fillStyle = '#38bdf8';
                ctx.font = 'bold 12px Inter, system-ui, sans-serif';
                ctx.textAlign = 'left';
                ctx.textBaseline = 'middle';
                ctx.fillText(`  ${product.city} 📍`, px + 6, py);
              } else {
                const pulse = 4 + Math.sin(Date.now() / 250 + index) * 1;
                
                ctx.beginPath();
                ctx.arc(px, py, pulse + 3, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
                ctx.fill();

                ctx.beginPath();
                ctx.arc(px, py, pulse, 0, Math.PI * 2);
                ctx.fillStyle = '#ffffff';
                ctx.fill();

                ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
                ctx.font = '11px Inter, system-ui, sans-serif';
                ctx.textAlign = 'left';
                ctx.textBaseline = 'middle';
                ctx.fillText(`  ${product.city}`, px + 6, py);
              }
            }
          });

          animationFrame = requestAnimationFrame(drawGlobe);
        };

        drawGlobe();

        return () => {
          cancelAnimationFrame(animationFrame);
          window.removeEventListener('resize', resizeCanvas);
        };
      }, []);

      return (
        <div className="min-h-screen bg-black text-white overflow-hidden relative font-sans">
          {/* Fondo con gradiente difuminado */}
          <div className="absolute inset-0 bg-[radial-gradient(circle_at_center,_rgba(42,79,255,0.25),_transparent_60%)]" />

          {/* Header / Barra de Navegación */}
          <header className="relative z-20 flex flex-col lg:flex-row lg:items-center lg:justify-between gap-6 px-6 md:px-10 py-6 border-b border-white/10 backdrop-blur-md bg-black/30 sticky top-0">
            <div className="flex items-center justify-between gap-6">
              <h1 className="text-2xl md:text-3xl font-semibold tracking-wide bg-gradient-to-r from-white to-neutral-400 bg-clip-text text-transparent">
                Where to Buy
              </h1>

              <nav className="hidden md:flex gap-6 text-sm text-white/60">
                <button className="hover:text-white transition-colors duration-200">Hidden Markets</button>
                <button className="hover:text-white transition-colors duration-200">Global Market</button>
                <button className="hover:text-white transition-colors duration-200">Trending</button>
              </nav>
            </div>

            {/* Input de búsqueda */}
            <div className="w-full lg:max-w-2xl flex gap-3 bg-white/5 border border-white/10 rounded-2xl p-3 backdrop-blur-md shadow-2xl">
              <input
                type="text"
                value={searchQuery}
                onChange={(e) => setSearchQuery(e.target.value)}
                placeholder="Search for anything... cameras, vinyls, leather jackets"
                className="flex-1 bg-transparent outline-none text-white placeholder:text-white/30 px-3"
              />

              <button className="bg-white text-black px-6 py-3 rounded-xl font-medium hover:scale-105 active:scale-95 transition-transform duration-200">
                Explore
              </button>
            </div>
          </header>

          {/* Sección Hero principal */}
          <section className="relative z-10 min-h-[85vh] flex items-center justify-center px-6 py-20">
            <div className="max-w-7xl w-full grid lg:grid-cols-2 gap-16 items-center">
              {/* Textos descriptivos */}
              <div className="relative z-20 text-center lg:text-left">
                <div className="inline-flex items-center gap-2 px-4 py-2 rounded-full border border-white/10 bg-white/5 text-sm text-white/60 backdrop-blur-md mb-6">
                  🌍 Discover markets around the world
                </div>

                <h2 className="text-5xl md:text-7xl font-bold leading-[0.95] tracking-tight">
                  Explore where the world buys things.
                </h2>

                <p className="mt-8 text-white/60 text-lg md:text-xl leading-relaxed max-w-2xl">
                  Discover hidden local markets, global prices and online stores through an interactive world experience.
                </p>

                <div className="mt-10 flex flex-wrap gap-4 justify-center lg:justify-start">
                  <button className="bg-white text-black px-8 py-4 rounded-2xl font-medium hover:scale-105 active:scale-95 transition-transform duration-200">
                    Start Exploring
                  </button>

                  <button className="border border-white/10 bg-white/5 px-8 py-4 rounded-2xl hover:bg-white/10 transition-colors duration-200 backdrop-blur-md">
                    View Trending Markets
                  </button>
                </div>
              </div>

              {/* Contenedor del Globo Canvas */}
              <div className="relative flex items-center justify-center">
                <div className="absolute w-[500px] h-[500px] bg-blue-500/10 blur-3xl rounded-full" />

                <canvas
                  ref={canvasRef}
                  onMouseDown={handleMouseDown}
                  onMouseMove={handleMouseMove}
                  onMouseUp={handleMouseUp}
                  onMouseLeave={handleMouseUp}
                  onTouchStart={handleTouchStart}
                  onTouchMove={handleTouchMove}
                  onTouchEnd={handleTouchEnd}
                  className="relative z-10 w-full max-w-[650px] aspect-square cursor-grab active:cursor-grabbing"
                />
              </div>
            </div>
          </section>

          {/* Sección de Tarjetas de Tendencias */}
          <section className="relative z-10 px-6 md:px-10 pb-24 max-w-7xl mx-auto">
            <div className="flex items-center justify-between mb-10">
              <div>
                <h3 className="text-3xl font-semibold">Trending Discoveries</h3>
                <p className="text-white/50 mt-2">
                  Popular markets and products explored by users.
                </p>
              </div>

              <button className="text-white/50 hover:text-white transition-colors duration-200 text-sm border border-white/10 px-5 py-3 rounded-xl bg-white/5 backdrop-blur-md">
                Open Full Map
              </button>
            </div>

            {/* Tarjetas filtradas */}
            <div className="grid md:grid-cols-2 xl:grid-cols-3 gap-6">
              {filteredProducts.length === 0 ? (
                <div className="col-span-full text-center py-16 text-white/40 border border-white/10 rounded-3xl bg-white/5 backdrop-blur-md">
                  No markets found for "{searchQuery}"
                </div>
              ) : (
                filteredProducts.map((product, index) => (
                  <div
                    key={index}
                    onMouseEnter={() => setHoveredCity(product.city)}
                    onMouseLeave={() => setHoveredCity(null)}
                    className="group bg-white/5 border border-white/10 rounded-3xl p-6 backdrop-blur-md hover:bg-white/10 transition-all duration-300 hover:-translate-y-1 hover:border-white/20"
                  >
                    <div className="flex items-center justify-between mb-4">
                      <span className="text-sm text-blue-300 font-medium">{product.city}</span>
                      <span className="text-xs text-white/40 bg-white/5 px-2 py-1 rounded-md">{product.type}</span>
                    </div>

                    <div className="h-44 rounded-2xl bg-gradient-to-br from-white/10 to-transparent border border-white/5 mb-6 flex items-center justify-center text-white/20 text-sm overflow-hidden group-hover:from-white/15 transition-all duration-300">
                      Market Preview
                    </div>

                    <h4 className="text-2xl font-semibold mb-3">
                      {product.item}
                    </h4>

                    <p className="text-white/60 text-sm leading-relaxed mb-6">
                      {product.description}
                    </p>

                    <div className="flex gap-3">
                      <button className="flex-1 bg-white text-black py-3 rounded-xl font-medium hover:scale-[1.02] active:scale-98 transition-transform duration-200">
                        View Market
                      </button>

                      <button className="px-4 py-3 border border-white/10 rounded-xl hover:bg-white/10 transition-colors duration-200">
                        Buy Online
                      </button>
                    </div>
                  </div>
                ))
              )}
            </div>
          </section>
        </div>
      );
    }

    const rootElement = document.getElementById('root');
    const root = ReactDOM.createRoot(rootElement);
    root.render(<WhereToBuyMockup />);
  </script>
</body>
</html>
